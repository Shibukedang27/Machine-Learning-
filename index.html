<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TextClassify ML</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Browser machine learning</p>
          <h1>TextClassify</h1>
        </div>
        <div class="model-chip" id="model-chip">Naive Bayes</div>
      </header>

      <section class="hero-grid">
        <article class="panel classifier-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Predict</p>
              <h2>Classify text</h2>
            </div>
            <button class="ghost-button" id="clear-text" type="button">Clear</button>
          </div>

          <label class="input-label" for="text-input">Input text</label>
          <textarea id="text-input" rows="8" placeholder="Paste a review, support message, or short note...">The product arrived quickly and the support team was helpful.</textarea>

          <div class="action-row">
            <button class="primary-button" id="classify-button" type="button">Classify</button>
            <button class="secondary-button" id="train-button" type="button">Train model</button>
          </div>

          <div class="prediction-card" aria-live="polite">
            <span class="prediction-label">Prediction</span>
            <strong id="prediction">Positive</strong>
            <div class="confidence-track" aria-label="Prediction confidence">
              <span id="confidence-bar"></span>
            </div>
            <p id="confidence-text">Confidence 86%</p>
          </div>
        </article>

        <aside class="panel insight-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Model</p>
              <h2>Training summary</h2>
            </div>
          </div>
          <div class="metric-grid">
            <div>
              <span>Samples</span>
              <strong id="sample-count">0</strong>
            </div>
            <div>
              <span>Classes</span>
              <strong id="class-count">0</strong>
            </div>
            <div>
              <span>Vocabulary</span>
              <strong id="vocab-count">0</strong>
            </div>
            <div>
              <span>Accuracy</span>
              <strong id="accuracy">0%</strong>
            </div>
          </div>
          <div class="explain-box">
            <span>Top signals</span>
            <div id="signals" class="signals"></div>
          </div>
        </aside>
      </section>

      <section class="panel dataset-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Dataset</p>
            <h2>Training examples</h2>
          </div>
          <button class="ghost-button" id="reset-data" type="button">Reset</button>
        </div>

        <form class="sample-form" id="sample-form">
          <input id="sample-text" type="text" placeholder="Add a training sentence">
          <select id="sample-label" aria-label="Training label">
            <option value="Positive">Positive</option>
            <option value="Negative">Negative</option>
            <option value="Question">Question</option>
          </select>
          <button class="secondary-button" type="submit">Add sample</button>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Text</th>
                <th>Label</th>
              </tr>
            </thead>
            <tbody id="dataset-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
